<!DOCTYPE html>
<html>
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Counter mini app</title>
    </head>
    <body>
        <section>
            <p style="font-weight: bold" id="counter-paragraph">Counter: <span id="counter-value" style="color: red">0</span></p>
            <div style="display: flex; gap: 16px">
                <button id="increment-btn">+</button>
                <button id="decrement-btn">-</button>
            </div>
        </section>
        <script src="index.js"></script>
    </body>
</html>
